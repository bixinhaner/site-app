<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <title>Baicells Sites Manager</title>
    <script>
      window.__baicellsH5PageErrors = []
      window.addEventListener('error', function (event) {
        window.__baicellsH5PageErrors.push({
          type: 'error',
          message: event && event.message ? String(event.message) : 'unknown error',
          filename: event && event.filename ? String(event.filename) : '',
        })
      })
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason
        window.__baicellsH5PageErrors.push({
          type: 'unhandledrejection',
          message: reason && (reason.stack || reason.message) ? String(reason.stack || reason.message) : String(reason),
        })
      })
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
