# 站点信息管理系统 - Nginx反向代理配置
# 适用于将8000和3030端口服务通过80端口访问

server {
    listen 80;
    server_name 113.45.25.135;  # 替换为实际服务器IP或域名
    
    # 全局设置
    client_max_body_size 50M;  # 支持大文件上传（照片等）
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 站点管理系统API - 后端服务(8000端口)
    location /site-api/ {
        # 移除路径前缀，转发到后端
        rewrite ^/site-api/(.*) /$1 break;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支持WebSocket (如果后端使用)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 站点管理系统Web管理端 - 前端服务(3030端口)  
    location /site-admin/ {
        # 移除路径前缀并转发到3030端口
        rewrite ^/site-admin/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支持前端路由
        proxy_redirect off;
    }
    
    # 处理不带斜杠的访问
    location = /site-admin {
        return 301 /site-admin/;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # API文档访问
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 安全设置
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 日志配置
    access_log /var/log/nginx/site-app.access.log;
    error_log /var/log/nginx/site-app.error.log;
}

# 可选：如果有域名，可以配置域名访问
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # 替换为实际域名
    
    # 重定向到IP访问或配置相同的代理规则
    return 301 http://113.45.25.135$request_uri;
}