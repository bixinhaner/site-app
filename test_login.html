<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .info {
            background: #cce7ff;
            color: #0056b3;
            border: 1px solid #b8daff;
            margin-bottom: 20px;
        }
        
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 3px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 登录功能测试</h1>
        
        <div class="info">
            <strong>测试说明：</strong><br>
            • 服务器地址: http://localhost:8002<br>
            • 测试账户: admin / admin123<br>
            • 此页面用于验证登录API是否正常工作
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码:</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            
            <button type="submit" id="loginBtn">登录测试</button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const result = document.getElementById('result');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 禁用按钮，显示加载状态
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            result.style.display = 'none';
            
            try {
                const response = await fetch('http://localhost:8002/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 登录成功
                    result.className = 'success';
                    result.innerHTML = `
                        <h3>✅ 登录成功！</h3>
                        <p><strong>用户信息:</strong></p>
                        <pre>${JSON.stringify(data.user, null, 2)}</pre>
                        <p><strong>访问令牌:</strong></p>
                        <pre>${data.access_token.substring(0, 50)}...</pre>
                        <p><strong>令牌类型:</strong> ${data.token_type}</p>
                        <p style="color: #28a745; font-weight: bold;">🎉 登录功能正常工作！</p>
                    `;
                } else {
                    // 登录失败
                    result.className = 'error';
                    result.innerHTML = `
                        <h3>❌ 登录失败</h3>
                        <p><strong>错误信息:</strong> ${data.detail || '未知错误'}</p>
                        <p><strong>状态码:</strong> ${response.status}</p>
                    `;
                }
            } catch (error) {
                // 网络错误
                result.className = 'error';
                result.innerHTML = `
                    <h3>❌ 网络错误</h3>
                    <p><strong>错误类型:</strong> ${error.name}</p>
                    <p><strong>错误信息:</strong> ${error.message}</p>
                    <p><strong>可能原因:</strong></p>
                    <ul>
                        <li>服务器未启动 (检查 http://localhost:8002)</li>
                        <li>网络连接问题</li>
                        <li>CORS配置问题</li>
                        <li>防火墙阻挡</li>
                    </ul>
                `;
            } finally {
                // 恢复按钮状态
                loginBtn.disabled = false;
                loginBtn.textContent = '登录测试';
                result.style.display = 'block';
            }
        });

        // 页面加载时检查服务器状态
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('http://localhost:8002/health');
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ 服务器状态检查成功:', data);
                } else {
                    console.log('⚠️ 服务器状态检查失败:', response.status);
                }
            } catch (error) {
                console.log('❌ 无法连接到服务器:', error.message);
                
                // 显示服务器连接提示
                const info = document.querySelector('.info');
                info.innerHTML += '<br><br><strong style="color: #dc3545;">⚠️ 无法连接到服务器，请确保后端服务器正在运行！</strong>';
            }
        });
    </script>
</body>
</html>
